version: "2"
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
  settings:
    misspell:
      locale: US
      ignore-words:
        - colour
  exclusions:
    paths:
      - .*_test\.go$
    rules:
      - linters:
          - errcheck
        path: .*_test\.go$
      - linters:
          - errcheck
        text: "defer .*\\.Close"
run:
  timeout: 60s
